context:
  version: "3.6.2"

package:
  name: skim
  version: ${{ version }}

source:
  url: https://github.com/skim-rs/skim/archive/v${{ version }}.tar.gz
  sha256: 959406f5b048b627e7d38f509146440c1819b8b934a0b69f471cf75e572de502

build:
  number: 0
  skip:
    - win
    - linux and ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - sk --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fuzzy Finder in rust!
  homepage: https://github.com/skim-rs/skim
  repository: https://github.com/skim-rs/skim

extra:
  recipe-maintainers:
    - danielnachun
